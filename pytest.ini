[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --tb=short
    --color=yes

markers =
    smoke: Minimum set that must pass for every build
    spur: Spur Gear tests
    helical: Helical Gear tests
    dh: Double Helical Gear tests
    internal: Internal gear tests (any internal variant)
    rack: Rack tests
    bevel: Bevel Gear tests
    hole_types: Tests covering the hole-type sub-form
    navigation: Site navigation tests
    a11y: Accessibility tests
    migration: Post-migration sanity tests
    slow: Tests that take > 10 seconds (large STL, Lighthouse, etc.)
    dxf: DXF laser-cut generator tests (/generators/lasercut)
    theme: Dark/Light theme toggle tests
    validation: Input validation and edge-case tests
